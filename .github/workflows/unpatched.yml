name: Unpatched
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qt4:
    name: Reject unpatched Qt 4.8 on Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: verify unpatched Qt 4 builds are rejected
        run: |
          docker run --rm \
            --volume "$PWD:/work" \
            --workdir /work \
            ubuntu:18.04 \
            bash -euxo pipefail -c '
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends make
              make install-dev QT=4
              if make build QT=4 2>&1 | tee /tmp/unpatched.log; then
                echo "unpatched Qt 4 build unexpectedly succeeded" >&2
                exit 1
              fi
              grep -F "require wkhtmltopdf patched Qt" /tmp/unpatched.log
            '

  qt5:
    name: Reject unpatched Qt 5 on Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: verify unpatched Qt 5 builds are rejected
        run: |
          docker run --rm \
            --volume "$PWD:/work" \
            --workdir /work \
            ubuntu:22.04 \
            bash -euxo pipefail -c '
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends make
              make install-dev QT=5
              if make build QT=5 2>&1 | tee /tmp/unpatched.log; then
                echo "unpatched Qt 5 build unexpectedly succeeded" >&2
                exit 1
              fi
              grep -F "require wkhtmltopdf patched Qt" /tmp/unpatched.log
            '
