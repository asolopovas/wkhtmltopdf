name: Unpatched
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qt4:
    name: Qt 4.8 on Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: build in legacy Qt 4 container
        run: |
          docker run --rm \
            --volume "$PWD:/work" \
            --workdir /work \
            ubuntu:18.04 \
            bash -euxo pipefail -c '
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                build-essential \
                ca-certificates \
                libqtwebkit-dev
              qmake-qt4 CONFIG+=silent
              make -j"$(nproc)"
            '

  qt5:
    name: Qt 5.12 on Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: build in Qt 5 container
        run: |
          docker run --rm \
            --volume "$PWD:/work" \
            --workdir /work \
            ubuntu:22.04 \
            bash -euxo pipefail -c '
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                build-essential \
                ca-certificates \
                libqt5svg5-dev \
                libqt5webkit5-dev \
                libqt5xmlpatterns5-dev \
                python3 \
                qt5-qmake \
                qtbase5-dev
              qmake CONFIG+=silent
              make -j"$(nproc)"
              WKHTMLTOPDF_BINARY="$PWD/bin/wkhtmltopdf" \
                WKHTMLTOIMAGE_BINARY="$PWD/bin/wkhtmltoimage" \
                python3 tests/smoke/smoke.py
            '
