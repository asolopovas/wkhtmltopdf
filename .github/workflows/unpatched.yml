name: Unpatched
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qt4:
    name: Qt 4.8 on Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: build in legacy Qt 4 container
        run: |
          docker run --rm \
            --volume "$PWD:/work" \
            --workdir /work \
            ubuntu:18.04 \
            bash -euxo pipefail -c '
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends make
              make install-dev QT=4
              make build QT=4
            '

  qt5:
    name: Qt 5.12 on Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: build in Qt 5 container
        run: |
          docker run --rm \
            --volume "$PWD:/work" \
            --workdir /work \
            ubuntu:22.04 \
            bash -euxo pipefail -c '
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends make
              make install-dev QT=5
              make test QT=5
            '
