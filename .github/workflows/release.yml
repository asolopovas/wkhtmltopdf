name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag to package, for example 0.13.0'
        required: true
        default: '0.13.0'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || '' }}
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
  RELEASE_OUTPUT: artifacts

jobs:
  linux-deb:
    name: Build general Linux deb
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
          submodules: true
      - name: build general Linux deb package with AVIF plugin
        run: |
          docker run --rm -v "$PWD:/src" -w /src ubuntu:24.04 bash -lc '
            set -euo pipefail
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              build-essential \
              ca-certificates \
              dpkg-dev \
              fonts-dejavu-core \
              fontconfig \
              gzip \
              libqt5svg5-dev \
              libqt5webkit5-dev \
              libqt5xmlpatterns5-dev \
              patchelf \
              qt5-avif-image-plugin \
              qt5-qmake \
              qtbase5-dev \
              qttools5-dev-tools
            RELEASE_OUTPUT=artifacts RELEASE_SERIES=linux MAKE_JOBS=$(nproc) scripts/build-linux-deb.sh
            chown -R --reference=/src artifacts tmp/logs 2>/dev/null || true
          '
      - name: upload Linux build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-build-logs
          path: tmp/logs/**/*.log
          if-no-files-found: ignore
      - name: install and test deb package
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils file libc-bin
          tests/deb/deb-loader.sh ./artifacts/linux-deb/*.deb
          python3 tests/smoke/smoke.py
        env:
          RELEASE_OUTPUT: artifacts
          WKHTMLTOPDF_BINARY: /usr/bin/wkhtmltopdf
          WKHTMLTOIMAGE_BINARY: /usr/bin/wkhtmltoimage
      - name: upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-deb
          path: artifacts/**
          if-no-files-found: error

  windows-exe:
    name: Build Windows setup exe
    runs-on: windows-2025
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
          submodules: true
      - name: setup MSYS2 with stable Qt 5 packages
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          release: false
          update: true
          cache: true
          install: >-
            base-devel
            git
            make
            mingw-w64-ucrt-x86_64-angleproject
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-nsis
            mingw-w64-ucrt-x86_64-qt5-base
            mingw-w64-ucrt-x86_64-qt5-svg
            mingw-w64-ucrt-x86_64-qt5-tools
            mingw-w64-ucrt-x86_64-qt5-xmlpatterns
            mingw-w64-ucrt-x86_64-qtwebkit
      - name: build Windows setup installer
        shell: msys2 {0}
        run: scripts/build-windows-msys2.sh
      - name: upload Windows build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-build-logs
          path: tmp/logs/**/*.log
          if-no-files-found: ignore
      - name: install and smoke-test setup installer
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Get-ChildItem "artifacts\windows-exe\*.exe" | Select-Object -First 1
          if (-not $installer) { throw "no installer found" }
          $process = Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait -PassThru
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
          $env:WKHTMLTOPDF_BINARY = "C:\Program Files\wkhtmltopdf\bin\wkhtmltopdf.exe"
          $env:WKHTMLTOIMAGE_BINARY = "C:\Program Files\wkhtmltopdf\bin\wkhtmltoimage.exe"
          python tests\smoke\smoke.py
      - name: upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-exe
          path: artifacts/**
          if-no-files-found: error

  github-release:
    name: Upload GitHub releases
    runs-on: ubuntu-24.04
    needs:
      - linux-deb
      - windows-exe
    steps:
      - name: download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.sha }}
          name: wkhtmltox ${{ env.RELEASE_VERSION }}
          files: artifacts/**
          fail_on_unmatched_files: true
          generate_release_notes: true
      - name: publish latest tag release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.sha }}
          name: wkhtmltox latest (${{ env.RELEASE_VERSION }})
          files: artifacts/**
          fail_on_unmatched_files: true
          generate_release_notes: false
