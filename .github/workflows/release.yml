name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag to package, for example 0.13.0'
        required: true
        default: '0.13.0'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || '' }}
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
  RELEASE_OUTPUT: artifacts

jobs:
  linux-deb:
    name: Build patched-Qt Linux deb
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}
          submodules: true
      - name: restore patched Qt Linux build cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zstd
          mkdir -p tmp/build-cache tmp/builds
          gh release download "build-cache-${RELEASE_VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*patched-qt-linux-focal-amd64-buildcache.tar.zst' \
            --dir tmp/build-cache
          tar -C tmp/builds --zstd -xf tmp/build-cache/*patched-qt-linux-focal-amd64-buildcache.tar.zst
          test -x tmp/builds/focal-amd64/qt/bin/qmake
      - name: build Linux deb with patched Qt
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -v "$PWD/tmp/builds/focal-amd64:/tgt" \
            -w /src \
            ubuntu:20.04 bash -lc '
              set -euo pipefail
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                binutils \
                build-essential \
                ca-certificates \
                dpkg-dev \
                file \
                fontconfig \
                fonts-dejavu-core \
                gzip \
                libfontconfig1-dev \
                libfreetype6-dev \
                libjpeg-dev \
                libpng-dev \
                libssl-dev \
                libx11-dev \
                libxext-dev \
                libxrender-dev \
                patchelf \
                zlib1g-dev
              QMAKE=/tgt/qt/bin/qmake RELEASE_OUTPUT=artifacts RELEASE_SERIES=linux MAKE_JOBS=$(nproc) scripts/build-linux-deb.sh
              chown -R --reference=/src artifacts tmp/logs 2>/dev/null || true
            '
      - name: upload Linux build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-build-logs
          path: tmp/logs/**/*.log
          if-no-files-found: ignore
      - name: install and test deb package
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils file imagemagick libc-bin
          tests/deb/deb-loader.sh ./artifacts/linux-deb/*.deb
          python3 tests/smoke/smoke.py
        env:
          RELEASE_OUTPUT: artifacts
          WKHTMLTOPDF_BINARY: /usr/bin/wkhtmltopdf
          WKHTMLTOIMAGE_BINARY: /usr/bin/wkhtmltoimage
      - name: upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-deb
          path: |
            artifacts/linux-deb/**
            artifacts/checksums-linux-deb.txt
          if-no-files-found: error

  windows-exe:
    name: Build patched-Qt Windows installer
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}
          submodules: true
      - name: restore patched Qt Windows build cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nsis p7zip-full python3 zstd
          git clone --depth 1 https://github.com/wkhtmltopdf/packaging.git /tmp/wkhtmltopdf-packaging
          mkdir -p tmp/build-cache /tmp/wkhtmltopdf-packaging/targets
          gh release download "build-cache-${RELEASE_VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*patched-qt-mxe-cross-win64-buildcache.tar.zst' \
            --dir tmp/build-cache
          tar -C /tmp/wkhtmltopdf-packaging/targets --zstd -xf tmp/build-cache/*patched-qt-mxe-cross-win64-buildcache.tar.zst
          test -d /tmp/wkhtmltopdf-packaging/targets/mxe-cross-win64
          mkdir -p /tmp/wkhtmltopdf-packaging/targets/mxe-cross-win64/app/bin
      - name: build Windows installer from patched Qt cache
        run: |
          set -euo pipefail
          cd /tmp/wkhtmltopdf-packaging
          python3 ./build package-docker --iteration 1 mxe-cross-win64 "$GITHUB_WORKSPACE"
          stage=/tmp/wkhtmltopdf-packaging/targets/mxe-cross-win64/wkhtmltox
          cp "$GITHUB_WORKSPACE/LICENSE" "$stage/LICENSE.txt"
          cp "$GITHUB_WORKSPACE/README.md" "$stage/README.txt"
          mkdir -p "$GITHUB_WORKSPACE/artifacts/windows-exe"
          makensis \
            -DVERSION="${RELEASE_VERSION}" \
            -DSOURCE_DIR="$stage" \
            -DOUT_FILE="$GITHUB_WORKSPACE/artifacts/windows-exe/wkhtmltox-${RELEASE_VERSION}-1.windows-mxe-cross-win64-installer.exe" \
            "$GITHUB_WORKSPACE/scripts/wkhtmltox.nsi"
          cd "$GITHUB_WORKSPACE/artifacts"
          find windows-exe -maxdepth 1 -type f -name '*.exe' -print | sort | xargs sha256sum > checksums-windows-exe.txt
      - name: upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-exe
          path: |
            artifacts/windows-exe/**
            artifacts/checksums-windows-exe.txt
          if-no-files-found: error

  windows-exe-smoke:
    name: Install and smoke-test Windows installer
    runs-on: windows-2025
    needs:
      - windows-exe
    steps:
      - name: checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}
      - name: download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-exe
          path: artifacts
      - name: install and smoke-test setup installer
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Get-ChildItem "artifacts\windows-exe\*.exe" | Select-Object -First 1
          if (-not $installer) { throw "no installer found" }
          $process = Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait -PassThru
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
          $env:WKHTMLTOPDF_BINARY = "C:\Program Files\wkhtmltopdf\bin\wkhtmltopdf.exe"
          $env:WKHTMLTOIMAGE_BINARY = "C:\Program Files\wkhtmltopdf\bin\wkhtmltoimage.exe"
          python tests\smoke\smoke.py

  github-release:
    name: Overwrite GitHub release assets
    runs-on: ubuntu-24.04
    needs:
      - linux-deb
      - windows-exe-smoke
    steps:
      - name: checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: move release tags to this commit
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -f "${RELEASE_VERSION}" "${GITHUB_SHA}"
          git tag -f latest "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_VERSION}" --force
          git push origin refs/tags/latest --force
      - name: publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: wkhtmltox ${{ env.RELEASE_VERSION }}
          files: |
            artifacts/linux-deb/**
            artifacts/windows-exe/**
            artifacts/checksums-*.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
      - name: publish latest tag release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: wkhtmltox latest (${{ env.RELEASE_VERSION }})
          files: |
            artifacts/linux-deb/**
            artifacts/windows-exe/**
            artifacts/checksums-*.txt
          fail_on_unmatched_files: true
          generate_release_notes: false
          overwrite_files: true
