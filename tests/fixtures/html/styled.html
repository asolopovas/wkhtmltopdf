<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Styled</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2em;
      }
      h1 {
        color: #245;
        border-bottom: 2px solid #69c;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #999;
        padding: 0.4em;
      }
    </style>
  </head>
  <body>
    <h1>Styled fixture</h1>
    <p>This page exercises basic CSS, tables, and UTF-8: café, 東京, مرحبا.</p>
    <table>
      <tr>
        <th>Name</th>
        <th>Value</th>
      </tr>
      <tr>
        <td>alpha</td>
        <td>1</td>
      </tr>
      <tr>
        <td>beta</td>
        <td>2</td>
      </tr>
    </table>
  </body>
</html>
